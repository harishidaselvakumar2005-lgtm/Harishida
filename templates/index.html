<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Admin Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* Bottom-right name styling */
        .footer-name {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="dashboard-header">
        <div class="logo-group">
            <i class="fas fa-car-side logo-icon"></i> 
            <span class="logo-text">UBER <span class="admin-tag">ADMIN</span></span>
        </div>
        <h2>Customer Management</h2>
    </div>

    <div class="form-container">
        <form action="{{ url_for('insert') }}" method="POST">
            <div class="input-group">
                <input type="text" name="name" placeholder="User Name" required>
                <input type="text" name="mobile" placeholder="Mobile Number" required>
                <input type="number" name="amount" placeholder="Travel Fare ($)" required>
                <input type="text" name="location" placeholder="User Location" required>
                <button type="submit" class="btn-add">
                    <i class="fas fa-plus"></i> <span>Add Booking</span>
                </button>
            </div>
        </form>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th><i class="fas fa-user"></i> Name</th>
                    <th><i class="fas fa-phone"></i> Mobile</th>
                    <th><i class="fas fa-money-bill"></i> Fare</th>
                    <th><i class="fas fa-map-marker-alt"></i> Location</th>
                    <th><i class="fas fa-cog"></i> Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for row in customers %}
                <tr>
                    <td>{{ row.name }}</td>
                    <td>{{ row.mobile }}</td>
                    <td class="fare-text">${{ row.amount }}</td>
                    <td>{{ row.location }}</td>
                    <td class="action-cell">
                        <a href="/update/{{row.id}}" class="btn-update-icon" title="Edit">
                            <i class="fas fa-pen-to-square"></i>
                        </a>
                        <a href="/delete/{{row.id}}" class="btn-delete-icon" onclick="return confirm('Delete this booking?')" title="Delete">
                            <i class="fas fa-trash-can"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Your Name at center bottom -->
<div class="footer-name">
     Developed by
             Harishida
</div>

</body>
</html>
